<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>LoginSphere</title>

<link rel="stylesheet" href="style.css">

<link rel="stylesheet"
href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
</head>

<body>

<!-- NAVBAR -->
<header class="navbar">

<div class="logo">
<img src="assets/Picture-1.png" alt="Logo">
</div>

<nav class="menu">
<a href="#">Home</a>
<a href="#">About</a>
<a href="#">Services</a>
<a href="#">Contact</a>
<button class="login-btn" onclick="showLogin()">Login</button>
</nav>

</header>

<!-- BACKGROUND -->
<div class="bg"></div>

<!-- AUTH CONTAINER -->
<div class="container">

<!-- LOGIN -->
<section id="loginBox" class="card active">

<h2>Login</h2>

<div class="input-box">
<i class="fa-solid fa-envelope"></i>
<input type="email" placeholder="Email">
</div>

<div class="input-box">
<i class="fa-solid fa-lock"></i>
<input type="password" placeholder="Password">
</div>

<div class="row">
<label><input type="checkbox"> Remember me</label>
<a onclick="showForgot()">Forgot Password?</a>
</div>

<button class="btn">Login</button>

<p class="switch">
Don’t have an account?
<a onclick="showRegister()">Register</a>
</p>

</section>

<!-- REGISTER -->
<section id="registerBox" class="card">

<h2>Registration</h2>

<div class="input-box">
<i class="fa-solid fa-user"></i>
<input type="text" placeholder="Username">
</div>

<div class="input-box">
<i class="fa-solid fa-envelope"></i>
<input type="email" placeholder="Email">
</div>

<div class="input-box">
<i class="fa-solid fa-lock"></i>
<input type="password" placeholder="Password">
</div>

<label class="terms">
<input type="checkbox">
I agree to Terms & Conditions
</label>

<button class="btn">Register</button>

<p class="switch">
Already have an account?
<a onclick="showLogin()">Login</a>
</p>

</section>

<!-- FORGOT -->
<section id="forgotBox" class="card">

<h2>Reset Password</h2>

<div class="input-box">
<i class="fa-solid fa-envelope"></i>
<input type="email" placeholder="Enter Email">
</div>

<button class="btn">Send Reset Link</button>

<p class="switch">
Back to <a onclick="showLogin()">Login</a>
</p>

</section>

</div>

<script src="script.js"></script>
</body>
</html>
