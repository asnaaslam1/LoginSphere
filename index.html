<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>LoginSphere</title>

<link rel="stylesheet" href="style.css">

<link rel="stylesheet"
href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
</head>

<body>

<!-- NAVBAR -->
<header>
<nav class="navbar">

<div class="logo">
<img src="assets/Picture-1.png" alt="Logo">
</div>

<ul class="menu">
<li><a href="#">Home</a></li>
<li><a href="#">About</a></li>
<li><a href="#">Services</a></li>
<li><a href="#">Contact</a></li>
<li><button class="login-btn" onclick="openLogin()">Login</button></li>
</ul>

</nav>
</header>

<!-- BACKGROUND -->
<div class="hero"></div>

<!-- LOGIN MODAL -->
<div class="overlay" id="overlay">

<div class="modal">

<!-- LOGIN -->
<div id="loginBox">

<h2>Login</h2>

<div class="input-box">
<i class="fa-solid fa-envelope"></i>
<input type="email" placeholder="Email">
</div>

<div class="input-box">
<i class="fa-solid fa-lock"></i>
<input type="password" placeholder="Password">
</div>

<div class="options">
<label><input type="checkbox"> Remember Me</label>
<a href="#" onclick="showForgot()">Forgot Password?</a>
</div>

<button class="btn">Login</button>

<p>
Don’t have account?
<a href="#" onclick="showRegister()">Register</a>
</p>

</div>

<!-- REGISTER -->
<div id="registerBox" class="hide">

<h2>Registration</h2>

<div class="input-box">
<i class="fa-solid fa-user"></i>
<input type="text" placeholder="Username">
</div>

<div class="input-box">
<i class="fa-solid fa-envelope"></i>
<input type="email" placeholder="Email">
</div>

<div class="input-box">
<i class="fa-solid fa-lock"></i>
<input type="password" placeholder="Password">
</div>

<label class="terms">
<input type="checkbox">
I agree to Terms & Conditions
</label>

<button class="btn">Register</button>

<p>
Already have account?
<a href="#" onclick="showLogin()">Login</a>
</p>

</div>

<!-- FORGOT PASSWORD -->
<div id="forgotBox" class="hide">

<h2>Reset Password</h2>

<div class="input-box">
<i class="fa-solid fa-envelope"></i>
<input type="email" placeholder="Enter Email">
</div>

<button class="btn">Send Reset Link</button>

<p>
Back to
<a href="#" onclick="showLogin()">Login</a>
</p>

</div>

</div>
</div>

<script src="script.js"></script>

</body>
</html>
