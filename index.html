<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>LoginSphere Ultimate</title>

<link rel="stylesheet" href="style.css">
<link rel="stylesheet"
href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
</head>

<body>

<!-- NAVBAR -->
<header class="navbar">

<div class="logo">
<img src="assets/Picture-1.png">
</div>

<nav>
<a href="#">Home</a>
<a href="#">About</a>
<a href="#">Services</a>
<a href="#">Contact</a>
<button onclick="showLogin()">Login</button>
</nav>

</header>

<!-- BACKGROUND -->
<div class="bg"></div>

<!-- CENTER WRAPPER -->
<div class="container">

<!-- LOGIN -->
<div class="card active" id="login">

<h2>Welcome Back</h2>
<p>Login to continue</p>

<div class="input">
<i class="fa-solid fa-envelope"></i>
<input type="email" placeholder="Email">
</div>

<div class="input">
<i class="fa-solid fa-lock"></i>
<input type="password" placeholder="Password">
</div>

<div class="row">
<label><input type="checkbox"> Remember me</label>
<a onclick="showForgot()">Forgot?</a>
</div>

<button class="btn">Login</button>

<p class="text">
Don’t have account?
<a onclick="showRegister()">Register</a>
</p>

</div>

<!-- REGISTER -->
<div class="card" id="register">

<h2>Create Account</h2>
<p>Join us today</p>

<div class="input">
<i class="fa-solid fa-user"></i>
<input type="text" placeholder="Username">
</div>

<div class="input">
<i class="fa-solid fa-envelope"></i>
<input type="email" placeholder="Email">
</div>

<div class="input">
<i class="fa-solid fa-lock"></i>
<input type="password" placeholder="Password">
</div>

<label class="terms">
<input type="checkbox"> I agree to Terms & Conditions
</label>

<button class="btn">Register</button>

<p class="text">
Already have account?
<a onclick="showLogin()">Login</a>
</p>

</div>

<!-- FORGOT -->
<div class="card" id="forgot">

<h2>Reset Password</h2>

<div class="input">
<i class="fa-solid fa-envelope"></i>
<input type="email" placeholder="Enter Email">
</div>

<button class="btn">Send Reset Link</button>

<p class="text">
Back to <a onclick="showLogin()">Login</a>
</p>

</div>

</div>

<script src="script.js"></script>
</body>
</html>
