<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>LoginSphere Dashboard</title>
<link rel="stylesheet" href="style.css">
</head>
<body>

<div class="container">

    <h1>Dashboard</h1>

    <h3 id="welcome"></h3>

    <button onclick="logout()">Logout</button>

</div>

<script>
const user = localStorage.getItem("currentUser");

if(!user){
    window.location.href = "index.html";
}

document.getElementById("welcome").innerHTML =
"Welcome to LoginSphere, " + user;
</script>

</body>
</html>S
